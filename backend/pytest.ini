[pytest]
# Pytest configuration for Business Structure Intelligence

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    api: API endpoint tests
    validation: Validation logic tests
    agents: Agent functionality tests
    cache: Cache tests
    integration: Integration tests
    slow: Slow running tests

# Coverage (optional)
# addopts = --cov=. --cov-report=html

# Ignore paths
norecursedirs = 
    .git
    node_modules
    __pycache__
    .pytest_cache
